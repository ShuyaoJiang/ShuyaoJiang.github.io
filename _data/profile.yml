short_bio: >-
  <p>
    I am a newly graduated Ph.D. in Computer Science and Engineering from <a href="https://www.cuhk.edu.hk/">The Chinese University of Hong Kong</a>, supervised by <a href="https://www.cse.cuhk.edu.hk/lyu/">Prof. Michael R. Lyu</a>.
    I received my B.Sc. and M.Eng. degrees in Computer Science from <a href="https://www.fudan.edu.cn/">Fudan University</a> in 2019 and 2022 respectively, supervised by <a href="https://www.y-droid.com/yz/">Prof. Yangfan Zhou</a>.
  </p>
  <p>
    My research interests include <b>software testing and debugging, program analysis, runtime optimization, and AI4SE</b>. 
    Currently, I am working on performance testing and optimization for WebAssembly runtime systems.
  </p>
  <p style="margin-top: 0.75rem; padding: 0.65rem 0.85rem; border-left: 4px solid #6f8ff2; border-radius: 6px; background: #f5f7ff; color: #25324d;">
    <b>I am actively seeking tenure-track faculty positions in software engineering. Please feel free to contact me about relevant opportunities.</b>
  </p>

